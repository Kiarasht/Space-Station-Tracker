name: Update YouTube Live Streams

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-youtube-live-streams
  cancel-in-progress: false

jobs:
  update-live-streams:
    name: Update live stream JSON
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Restore previous live stream JSON
        run: |
          git fetch origin refs/heads/live-stream-cache:refs/remotes/origin/live-stream-cache || true
          if git show origin/live-stream-cache:docs/nasa-live-streams.json > docs/nasa-live-streams.json 2>/dev/null; then
            echo "Restored previous live stream JSON from live-stream-cache."
          else
            echo "No previous live stream JSON found."
          fi

      - name: Fetch YouTube live stream status
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node .github/scripts/update-youtube-live-streams.js

      - name: Commit live stream JSON
        run: |
          cache_branch="live-stream-cache"
          cache_file="docs/nasa-live-streams.json"
          temp_json="$(mktemp)"
          remote_branch_exists="false"

          cp "$cache_file" "$temp_json"
          git reset --hard
          git clean -fd

          if git show-ref --verify --quiet "refs/remotes/origin/$cache_branch"; then
            remote_branch_exists="true"
            git switch --track "origin/$cache_branch"
          else
            git switch --orphan "$cache_branch"
            git rm -rf . || true
          fi

          mkdir -p "$(dirname "$cache_file")"
          cp "$temp_json" "$cache_file"

          if [ "$remote_branch_exists" = "true" ] && git diff --quiet -- "$cache_file"; then
            echo "No live stream status changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$cache_file"
          git commit -m "Update NASA live stream status [skip ci]"
          git push -u origin "$cache_branch"

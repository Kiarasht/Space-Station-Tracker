name: Update YouTube Live Streams

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-youtube-live-streams
  cancel-in-progress: false

jobs:
  update-live-streams:
    name: Update live stream JSON
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch YouTube live stream status
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node .github/scripts/update-youtube-live-streams.js
        continue-on-error: true

      - name: Commit live stream JSON
        run: |
          if git diff --quiet -- docs/nasa-live-streams.json; then
            echo "No live stream status changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/nasa-live-streams.json
          git commit -m "Update NASA live stream status [skip ci]"
          git push
